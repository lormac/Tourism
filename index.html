<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newfoundland Travel Companion</title>
<style>
body{font-family:Arial,sans-serif;background:#eef7fb;margin:0;color:#17313b}
header{background:#007c89;color:#fff;padding:20px;text-align:center}
nav{display:flex;gap:8px;padding:10px;background:#d9f0f5;overflow:auto}
nav button{padding:10px 16px;border:none;border-radius:20px;cursor:pointer}
nav button.active{background:#007c89;color:#fff}
section{display:none;padding:20px;max-width:900px;margin:auto}
section.active{display:block}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
input,textarea{width:100%;padding:10px;margin:6px 0;box-sizing:border-box}
button.primary{background:#007c89;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer}
.message{background:#eef7fb;padding:10px;border-radius:10px;margin:8px 0}
img{max-width:100%;border-radius:10px}
  section {
  display: none;
}

section.active {
  display: block;
}
</style>
</head>
<body>
<header><h1>Newfoundland Travel Companion</h1><p>Chat • Questions • Photos • Itinerary</p></header>
<nav>
  <button type="button" class="tab active" data-target="home">Home</button>
  <button type="button" class="tab" data-target="chat">Messenger</button>
  <button type="button" class="tab" data-target="photos">Photos</button>
  <button type="button" class="tab" data-target="trip">Itinerary</button>
</nav>
<section id="home" class="active">
<div class="card">
<h2>Welcome!</h2>
<p>Plan your Newfoundland adventure, chat with travelers, post photos and build an itinerary.</p>
</div>
</section>

<section id="chat">
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signUp()">Create Account</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<textarea id="msg" placeholder="Write a message"></textarea>
<input id="messagePhoto" type="file" accept="image/*">
<button onclick="addMsg()">Send Message</button>

<div id="msgs"></div>
</section>

<section id="photos">
<div class="card">
<input id="caption" placeholder="Caption">
<input type="file" id="photo">
<button class="primary" onclick="addPhoto()">Upload</button>
</div>
<div class="card" id="gallery"></div>
</section>

<section id="trip">
<div class="card">
<input id="day" placeholder="Day">
<input id="place" placeholder="Place">
<textarea id="plan" placeholder="Plan"></textarea>
<button class="primary" onclick="addTrip()">Add</button>
</div>
<div class="card" id="triplist"></div>
</section>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ttqvjplanjvufolvdrxs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_f-ngZYW_a6dRwCE4Gtrx0Q_j2yHOU0V";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let photos = JSON.parse(localStorage.getItem("photos") || "[]");
let trips = JSON.parse(localStorage.getItem("trips") || "[]");
let currentConversationId = null;

function showTab(tabId) {
  document.querySelectorAll("section").forEach(section => {
    section.classList.remove("active");
  });

  document.querySelectorAll(".tab").forEach(button => {
    button.classList.remove("active");
  });

  document.getElementById(tabId).classList.add("active");
  document.querySelector(`[data-tab="${tabId}"]`).classList.add("active");
}

document.querySelectorAll(".tab").forEach(button => {
  button.addEventListener("click", () => {
    showTab(button.dataset.tab);
  });
});

async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({ email, password });
  alert(error ? error.message : "Account created. Now login.");
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) return alert(error.message);

  alert("Logged in!");
  await setupChat();
  await loadMessages();
}

async function logout() {
  await supabase.auth.signOut();
  alert("Logged out");
}

async function setupChat() {
  const { data: userData } = await supabase.auth.getUser();
  const user = userData.user;
  if (!user) return;

  let { data: conversations } = await supabase
    .from("conversations")
    .select("*")
    .eq("title", "Public Newfoundland Chat")
    .limit(1);

  if (!conversations || conversations.length === 0) {
    const { data: newConversation, error } = await supabase
      .from("conversations")
      .insert({
        title: "Public Newfoundland Chat",
        created_by: user.id
      })
      .select()
      .single();

    if (error) return alert(error.message);

    currentConversationId = newConversation.id;
  } else {
    currentConversationId = conversations[0].id;
  }

  await supabase
    .from("conversation_members")
    .upsert({
      conversation_id: currentConversationId,
      user_id: user.id
    });
}

async function addMsg() {
  const { data: userData } = await supabase.auth.getUser();
  const user = userData.user;

  if (!user) return alert("Please login first.");

  if (!currentConversationId) {
    await setupChat();
  }

  const messageText = document.getElementById("msg").value;
  const fileInput = document.getElementById("messagePhoto");
  const file = fileInput ? fileInput.files[0] : null;

  let photoUrl = null;

  if (file) {
    const fileName = `${user.id}/${Date.now()}-${file.name}`;

    const { error: uploadError } = await supabase.storage
      .from("message-photos")
      .upload(fileName, file);

    if (uploadError) return alert(uploadError.message);

    const { data } = supabase.storage
      .from("message-photos")
      .getPublicUrl(fileName);

    photoUrl = data.publicUrl;
  }

  const { error } = await supabase.from("messages").insert({
    conversation_id: currentConversationId,
    sender_id: user.id,
    message: messageText,
    photo_url: photoUrl
  });

  if (error) return alert(error.message);

  document.getElementById("msg").value = "";
  if (fileInput) fileInput.value = "";

  await loadMessages();
}

async function loadMessages() {
  if (!currentConversationId) return;

  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .eq("conversation_id", currentConversationId)
    .order("created_at", { ascending: false });

  if (error) return alert(error.message);

  document.getElementById("msgs").innerHTML = data.map(x => `
    <div class="message">
      <p>${x.message || ""}</p>
      ${x.photo_url ? `<img src="${x.photo_url}" style="max-width:100%;border-radius:12px;">` : ""}
      <small>${new Date(x.created_at).toLocaleString()}</small>
    </div>
  `).join("");
}

function addPhoto() {
  let f = photo.files[0];
  if (!f) return;

  let r = new FileReader();
  r.onload = e => {
    photos.unshift({ c: caption.value, i: e.target.result });
    localStorage.setItem("photos", JSON.stringify(photos));
    renderLocal();
    caption.value = "";
    photo.value = "";
  };
  r.readAsDataURL(f);
}

function addTrip() {
  trips.push({ d: day.value, p: place.value, t: plan.value });
  localStorage.setItem("trips", JSON.stringify(trips));
  renderLocal();
  day.value = "";
  place.value = "";
  plan.value = "";
}

function renderLocal() {
  document.getElementById("gallery").innerHTML = photos.map(x =>
    `<div><p>${x.c}</p><img src="${x.i}"></div><hr>`
  ).join("");

  document.getElementById("triplist").innerHTML = trips.map(x =>
    `<div><b>${x.d} - ${x.p}</b><p>${x.t}</p></div><hr>`
  ).join("");
}

supabase
  .channel("live-public-chat")
  .on(
    "postgres_changes",
    { event: "*", schema: "public", table: "messages" },
    loadMessages
  )
  .subscribe();

renderLocal();
setupChat().then(loadMessages);
</script>
  <script>
document.addEventListener("DOMContentLoaded", function () {
  const buttons = document.querySelectorAll(".tab");
  const sections = document.querySelectorAll("section");

  buttons.forEach(function (button) {
    button.addEventListener("click", function () {
      const targetId = button.getAttribute("data-target");

      sections.forEach(function (section) {
        section.classList.remove("active");
      });

      buttons.forEach(function (btn) {
        btn.classList.remove("active");
      });

      const targetSection = document.getElementById(targetId);

      if (!targetSection) {
        alert("Missing section: " + targetId);
        return;
      }

      targetSection.classList.add("active");
      button.classList.add("active");
    });
  });
});
</script>
</body>
</html>
